services:
  - type: web
    name: snap-search-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snap-search-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: snap-search-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: snap-search-redis
          type: redis
          property: connectionString
      # Set these manually in the Render dashboard:
      # OPENAI_API_KEY, REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET, YOUTUBE_API_KEY
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: REDDIT_USER_AGENT
        value: flashclone/1.0
      - key: CORS_ORIGINS
        value: https://nableel.vercel.app

  - type: pgsql
    name: snap-search-db
    region: oregon
    databaseName: flashclone
    plan: free

  - type: redis
    name: snap-search-redis
    region: oregon
    plan: free

